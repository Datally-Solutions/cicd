name: Reusable Cloud Build

on:
  workflow_call:
    inputs:
      config_path:
        description: "Path to the cloudbuild YAML file"
        required: true
        type: string
      region:
        required: false
        type: string
        default: "europe-west9"
      short_sha:
        description: "Short SHA to pass as SHORT_SHA substitution"
        required: true
        type: string

permissions:
  contents: read

jobs:
  cloud-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: gcp
        uses: Datally-Solutions/cicd/.github/actions/gcp-auth@main

      - uses: google-github-actions/setup-gcloud@v2

      - name: Submit Cloud Build
        env:
          CONFIG_PATH: ${{ inputs.config_path }}
          GCP_PROJECT_ID: ${{ steps.gcp.outputs.project_id }}
          REGION: ${{ inputs.region }}
          SHORT_SHA: ${{ inputs.short_sha }}
        run: |
          gcloud builds submit . \
            --config="$CONFIG_PATH" \
            --project="$GCP_PROJECT_ID" \
            --region="$REGION" \
            --substitutions="SHORT_SHA=$SHORT_SHA"
