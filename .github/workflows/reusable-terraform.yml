name: Reusable Terraform Workflow

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Path to Terraform root"
        required: true
        type: string
      state_prefix:
        description: "GCS state prefix (e.g. infra, backend)"
        required: true
        type: string
      environment:
        description: "Deployment environment"
        required: false
        type: string
        default: "production"
      ingest_token_sm_secret:
        description: "Nom du secret SM pour TF_VAR_ingest_token (laisser vide si non requis)"
        required: false
        type: string
        default: ""
      extra_vars:
        description: "Extra -var flags passed to terraform plan (space-separated, non-sensitive only)"
        required: false
        type: string
        default: ""
      terraform_version:
        description: "Terraform version to install"
        required: false
        type: string
        default: "1.10.3"

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform ${{ inputs.state_prefix }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    # -------------------------------------------------------
    # Config GCP — valeurs non-sensibles, hardcodées ici.
    # La sécurité vient de WIF + IAM, pas de la confidentialité de ces strings.
    # -------------------------------------------------------
    env:
      GCP_REGION:     "europe-west9"
      TFSTATE_BUCKET: "cat-litter-monitor-tfstate"
      ALERT_EMAIL:    "leqsiouer.mehdi@outlook.com"

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: gcp
        uses: Datally-Solutions/cicd/.github/actions/gcp-auth@main

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Fetch ingest_token from Secret Manager
        if: inputs.ingest_token_sm_secret != ''
        id: sm
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |
            ingest_token:${{ steps.gcp.outputs.project_id }}/${{ inputs.ingest_token_sm_secret }}

      - name: Export ingest_token as TF var
        if: inputs.ingest_token_sm_secret != '' && steps.sm.outputs.ingest_token != ''
        env:
          _val: ${{ steps.sm.outputs.ingest_token }}
        run: echo "TF_VAR_ingest_token=$_val" >> "$GITHUB_ENV"

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        env:
          TF_VAR_GCP_PROJECT_ID: ${{ steps.gcp.outputs.project_id }}
          TF_VAR_GCP_REGION: ${{ env.GCP_REGION }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TFSTATE_BUCKET }}" \
            -backend-config="prefix=${{ inputs.state_prefix }}"

      - name: Terraform Format Check
        id: fmt
        working-directory: ${{ inputs.working_directory }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        working-directory: ${{ inputs.working_directory }}
        run: terraform validate
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        working-directory: ${{ inputs.working_directory }}
        env:
          TF_VAR_GCP_PROJECT_ID: ${{ steps.gcp.outputs.project_id }}
          TF_VAR_GCP_REGION: ${{ env.GCP_REGION }}
          TF_VAR_alert_email: ${{ env.ALERT_EMAIL }}
          EXTRA_VARS: ${{ inputs.extra_vars }}
        run: |
          extra_args=()
          if [[ -n "$EXTRA_VARS" ]]; then
            read -ra extra_args <<< "$EXTRA_VARS"
          fi
          terraform plan \
            -input=false \
            -out=tfplan \
            -no-color \
            "${extra_args[@]}" \
            2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan as PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ inputs.working_directory }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            const icon = (outcome) => outcome === 'success' ? '✅' : outcome === 'failure' ? '❌' : '⚠️';
            const body = `## Terraform Plan — \`${{ inputs.state_prefix }}\`

            | Step | Result |
            |------|--------|
            | Format | ${icon('${{ steps.fmt.outcome }}')} \`${{ steps.fmt.outcome }}\` |
            | Validate | ${icon('${{ steps.validate.outcome }}')} \`${{ steps.validate.outcome }}\` |
            | Plan | ${icon('${{ steps.plan.outcome }}')} \`${{ steps.plan.outcome }}\` |

            <details><summary>Plan output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if fmt, validate, or plan failed
        if: steps.fmt.outcome == 'failure' || steps.validate.outcome == 'failure' || steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload plan artifact
        if: github.ref == 'refs/heads/main' && steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.state_prefix }}
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 1

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ inputs.working_directory }}
        env:
          TF_VAR_GCP_PROJECT_ID: ${{ steps.gcp.outputs.project_id }}
          TF_VAR_GCP_REGION: ${{ env.GCP_REGION }}
          TF_VAR_alert_email: ${{ env.ALERT_EMAIL }}
        run: terraform apply -auto-approve tfplan
