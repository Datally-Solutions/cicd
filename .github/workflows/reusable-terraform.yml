name: Reusable Terraform Workflow

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Path to Terraform root"
        required: true
        type: string
      state_prefix:
        description: "GCS state prefix (e.g. infra, backend)"
        required: true
        type: string
      environment:
        description: "Deployment environment"
        required: false
        type: string
        default: "production"
      has_tfvars:
        description: "Whether to write TF_VARS secret to terraform.tfvars"
        required: false
        type: boolean
        default: true
      extra_vars:
        description: "Extra -var flags passed to terraform plan (space-separated)"
        required: false
        type: string
        default: ""
      terraform_version:
        description: "Terraform version to install"
        required: false
        type: string
        default: "1.10.3"
    secrets:
      TF_VARS:
        required: false
      WIF_PROVIDER:
        required: true
      CICD_SA_EMAIL:
        required: true
      TFSTATE_BUCKET:
        required: true
      GCP_PROJECT_ID:
        required: true
      GCP_REGION:
        required: true

jobs:
  terraform:
    name: Terraform ${{ inputs.state_prefix }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f  # v2.1.7
        with:
          token_format: "access_token"
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.CICD_SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54531c595b04abd3f01d98dba1a3b0093b4b  # v3.1.2
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Write tfvars
        if: inputs.has_tfvars
        env:
          WORKING_DIR: ${{ inputs.working_directory }}
        run: |
          cat <<'EOF' > "$WORKING_DIR/terraform.tfvars"
          ${{ secrets.TF_VARS }}
          EOF

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        env:
          TF_VAR_GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TFSTATE_BUCKET }}" \
            -backend-config="prefix=${{ inputs.state_prefix }}"

      - name: Terraform Format Check
        id: fmt
        working-directory: ${{ inputs.working_directory }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        working-directory: ${{ inputs.working_directory }}
        run: terraform validate
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        working-directory: ${{ inputs.working_directory }}
        env:
          TF_VAR_GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_GCP_REGION: ${{ secrets.GCP_REGION }}
          EXTRA_VARS: ${{ inputs.extra_vars }}
        run: |
          # Split EXTRA_VARS into an array to avoid unquoted word-split injection
          extra_args=()
          if [[ -n "$EXTRA_VARS" ]]; then
            read -ra extra_args <<< "$EXTRA_VARS"
          fi
          terraform plan \
            -input=false \
            -out=tfplan \
            -no-color \
            "${extra_args[@]}" \
            2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan as PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ inputs.working_directory }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            const icon = (outcome) => outcome === 'success' ? '✅' : outcome === 'failure' ? '❌' : '⚠️';
            const body = `## Terraform Plan — \`${{ inputs.state_prefix }}\`

            | Step | Result |
            |------|--------|
            | Format | ${icon('${{ steps.fmt.outcome }}')} \`${{ steps.fmt.outcome }}\` |
            | Validate | ${icon('${{ steps.validate.outcome }}')} \`${{ steps.validate.outcome }}\` |
            | Plan | ${icon('${{ steps.plan.outcome }}')} \`${{ steps.plan.outcome }}\` |

            <details><summary>Plan output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if fmt, validate, or plan failed
        if: steps.fmt.outcome == 'failure' || steps.validate.outcome == 'failure' || steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload plan artifact
        if: github.ref == 'refs/heads/main' && steps.plan.outcome == 'success'
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1  # v4.6.1
        with:
          name: tfplan-${{ inputs.state_prefix }}
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 1

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ inputs.working_directory }}
        env:
          TF_VAR_GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_GCP_REGION: ${{ secrets.GCP_REGION }}
        run: terraform apply -auto-approve tfplan

      - name: Cleanup tfvars
        if: always() && inputs.has_tfvars
        env:
          WORKING_DIR: ${{ inputs.working_directory }}
        run: rm -f "$WORKING_DIR/terraform.tfvars"
